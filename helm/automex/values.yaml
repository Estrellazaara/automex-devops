# Configuración global de AutoMex

namespace: automex

# Configuración para el catalog-service
catalog:
  enabled: true
  image:
    repository: automex/catalog-service
    tag: "1.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 5001
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# Configuración para appointments-service
appointments:
  enabled: true
  image:
    repository: automex/appointments-service
    tag: "1.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 5000
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# Configuración para inventory-service
inventory:
  enabled: true
  image:
    repository: automex/inventory-service
    tag: "1.0"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 5000
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
