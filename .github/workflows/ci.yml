name: CI - AutoMex DevOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog-service, appointments-service, inventory-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: |
          cd services/${{ matrix.service }}
          flake8 app.py --max-line-length=120 --extend-ignore=E501,W503 || true
          echo "Lint completo"

  build-and-test:
    name: Build and Test Docker
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: catalog-service
            internal_port: 5001
          - service: appointments-service
            internal_port: 5000
          - service: inventory-service
            internal_port: 5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          cd services/${{ matrix.service }}
          docker build -t automex/${{ matrix.service }}:ci .

      - name: Test container
        run: |
          docker run -d --name test-svc -p ${{ matrix.internal_port }}:${{ matrix.internal_port }} -e PORT=${{ matrix.internal_port }} automex/${{ matrix.service }}:ci
          sleep 8
          curl -f http://localhost:${{ matrix.internal_port }}/health
          docker stop test-svc

  validate-helm:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Helm Lint
        run: |
          cd helm/automex
          helm lint .

      - name: Helm Template
        run: |
          cd helm/automex
          helm template automex . > /tmp/rendered.yaml
          echo "Helm chart valido"

  validate-k8s:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML
        run: |
          for f in k8s/*.yaml; do
            echo "Validando $f"
            yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, comments: disable, truthy: disable}}" $f
          done

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-python, build-and-test, validate-helm, validate-k8s]
    if: always()
    steps:
      - name: Print summary
        run: echo "Pipeline AutoMex DevOps completado"
